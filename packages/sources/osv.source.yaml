name: osv
version: 0.1.0
dsl_version: 3
backend: jsonl
test_queries:
  - SELECT * FROM osv.vulnerabilities LIMIT 1
tables:
  - name: vulnerabilities
    description: Seeded OSV-like dependency vulnerability findings
    source:
      location: file:///ABSOLUTE_PATH_TO_DEMO_DATA/vulnerabilities/
      glob: "osv.jsonl"
    columns:
      - name: osv_id
        type: Utf8
      - name: package_name
        type: Utf8
      - name: affected_version
        type: Utf8
      - name: severity
        type: Utf8
      - name: summary
        type: Utf8
      - name: published_at
        type: Utf8
